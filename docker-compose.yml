services:
  app:
    build: .
    container_name: idphoto-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://idphoto:secret@db:5432/idphoto
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me-in-production}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NODE_ENV=production
    volumes:
      # Persistent upload storage — survives container restarts
      - /opt/idphoto-app/data/uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - idphoto-net

  db:
    image: postgres:16-alpine
    container_name: idphoto-db
    environment:
      POSTGRES_USER: idphoto
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: idphoto
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idphoto -d idphoto"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - idphoto-net

volumes:
  pg_data:
    driver: local

networks:
  idphoto-net:
    driver: bridge
